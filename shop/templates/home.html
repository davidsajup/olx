{% extends 'base.html' %}
{%load static%}
{%block title%}Home Page{%endblock%}
{%block style%}  
<link rel="stylesheet" href="{%static 'css/home.css'%}"> 
{%endblock%}

{% block content %}

<div class="category-row">
    {%for i in category%}
    <div class="category">
    <img src="{{i.img.url}}" alt="">
    <a href="/viewcategory/{{i.id}}"><h6>{{i.name}}</h6></a>
    </div>
    {%endfor%}
</div>

<div class="container">
  {%for i in pro%}
  <div class="card ad" style="width: 25%;">
    <img src="{{i.img.url}}" class="card-img-top" alt="...">
    <div class="card-body">
      <h5 class="card-title">{{i.name}}</h5>
      <h6>₹ {{i.price}}</h6>
      <h6 class="text-muted">{{i.location}}</h6>
      <a href="/viewproduct/{{i.id}}" class="btn btn-outline-dark">View Details</a>
    </div>
  </div>
  {%endfor%}
</div>
{% endblock %}
