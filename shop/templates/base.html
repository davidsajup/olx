{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{%block title%}{%endblock%}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
{%block style%}{%endblock%}
<style>
input{
    border-radius: 50px;

}

a{
    color:black;
    text-align: center;
    text-decoration: none;
}

.custom{
    background-color: #f5faff;
}

form{
    height:50px;
}

.sell-btn {
  font-size: 16px;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: 999px;
  border: 3px solid transparent;
  cursor: pointer;
  background: 
    linear-gradient(white, white) padding-box,
    linear-gradient(90deg, #f5c542, #2b7cff) border-box;
}

.sell-btn:hover{
    background-color: #f5c542;
}

.profile_logo{
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    border: 1px solid black;
    border-radius: 25px;
    padding:5px;
}
</style>
</head>
<body>
    
    <nav class="navbar navbar-dark custom">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
        <img src="{%static 'images/olx.png'%}" alt="" width="60" height="40">
        </a>
        <form class="d-flex" action="/search/">
        <input class="form-control rounded-pill" type="search" placeholder="Search Products..." aria-label="Search" name="product" style="width:400px;">
        <button class="btn btn-light" type="submit"><img src="{%static 'images/search.png'%}" alt="" width="50" height="40"></button>
        </form>
         
        {%if user.is_authenticated%}
        <div class="profile_logo">
            <h5 style="margin-top: 8px;">{{user.first_name}}</h5>
            <img src="{{user.profile.pic.url}}" alt="" height="40px" width="40px" style="border-radius: 50%;">
        </div>
        
        <a href="/logout/"><button type="button" class="btn btn-outline-dark rounded-pill">Logout</button></a>
        <a href="/profile/"><button type="button" class="btn btn-outline-dark rounded-pill">View My Profile</button></a>
        
        {%else%}
        <a href="/register/"><button type="button" class="btn btn-outline-dark rounded-pill">Register</button></a>
        <div class="login-button">
            <a href="/login/"><img src="{% static 'images/login.jpg' %}" alt="" width="60" height="60" class="d-inline-block align-text-top"></a>
        </div>
        {%endif%}
        <a href="/addproduct/"><button type="button" class="sell-btn">Sell</button></a>
    </div>
    </nav>
    {% block content %}
    {% endblock %}



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
